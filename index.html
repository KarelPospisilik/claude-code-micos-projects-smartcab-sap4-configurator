// ── PDF font cache ────────────────────────────────────────────────────────────
let _pdfFont = null;
let _pdfFontBold = null;

async function loadPdfFont() {
  if (_pdfFont) return _pdfFont;
  const res = await fetch("https://cdn.jsdelivr.net/npm/dejavu-fonts-ttf@2.37.3/ttf/DejaVuSans.ttf");
  const buf = await res.arrayBuffer();
  const bytes = new Uint8Array(buf);
  const chunks = [];
  for (let i = 0; i < bytes.length; i += 8192) {
    chunks.push(String.fromCharCode(...bytes.subarray(i, i + 8192)));
  }
  _pdfFont = btoa(chunks.join(""));
  return _pdfFont;
}

async function loadPdfFontBold() {
  if (_pdfFontBold) return _pdfFontBold;
  const res = await fetch("https://cdn.jsdelivr.net/npm/dejavu-fonts-ttf@2.37.3/ttf/DejaVuSans-Bold.ttf");
  const buf = await res.arrayBuffer();
  const bytes = new Uint8Array(buf);
  const chunks = [];
  for (let i = 0; i < bytes.length; i += 8192) {
    chunks.push(String.fromCharCode(...bytes.subarray(i, i + 8192)));
  }
  _pdfFontBold = btoa(chunks.join(""));
  return _pdfFontBold;
}

// ── Helper: build BOM from state ────────────────────────────────────────────
function buildBOM(sel) {
  const cabinetSize = CABINET_SIZES.find(x => x.code === sel.cabinetSize);
  const w = cabinetSize ? cabinetSize.w : "700";

  const getBase = () => {
    if (!sel.base || sel.base === "N") return null;
    const b = BASES.find(x => x.code === sel.base);
    return b ? { name: `Základna ${b.label}`, sku: b.skuMap[w] } : null;
  };

  const pick = (arr, code, namePrefix) => {
    if (!code || code === "N") return null;
    const item = arr.find(x => x.code === code);
    return item ? { name: `${namePrefix}${item.label}${item.detail ? " — " + item.detail : ""}`, sku: item.sku } : null;
  };

  const coolingFlat = COOLING.flatMap(g => g.options);
  const coolItem = sel.cooling && sel.cooling !== "N"
    ? coolingFlat.find(x => x.code === sel.cooling) : null;

  return [
    {
      label: "Rozváděčová skříň",
      items: [
        cabinetSize ? { name: `Skříň ${cabinetSize.label} — ${cabinetSize.detail}`, sku: cabinetSize.sku, qty: "1" } : null,
        getBase() ? { ...getBase(), qty: "1" } : null,
        pick(VERT_RAILS, sel.vertRails, "Vert. lišty — ") ? { ...pick(VERT_RAILS, sel.vertRails, "Vert. lišty — "), qty: "1" } : null,
        pick(CABLE_LEFT,  sel.cableLeft,  "Lev. kabel. vstupy — ") ? { ...pick(CABLE_LEFT,  sel.cableLeft,  "Lev. kabel. vstupy — "), qty: "1" } : null,
        pick(CABLE_RIGHT, sel.cableRight, "Prav. kabel. vstupy — ") ? { ...pick(CABLE_RIGHT, sel.cableRight, "Prav. kabel. vstupy — "), qty: "1" } : null,
      ].filter(Boolean),
    },
    {
      label: "Topení",
      items: [
        pick(HEATERS,     sel.heater,      "") ? { ...pick(HEATERS,     sel.heater,      ""), qty: "1" } : null,
        pick(THERMOSTATS, sel.thermostat,  "Termostat — ") ? { ...pick(THERMOSTATS, sel.thermostat, "Termostat — "), qty: "1" } : null,
        pick(HEATED_SHELF,sel.heatedShelf, "") ? { ...pick(HEATED_SHELF,sel.heatedShelf, ""), qty: "1" } : null,
      ].filter(Boolean),
    },
    {
      label: "Chlazení",
      items: coolItem
        ? [{ name: coolItem.label + (coolItem.detail ? " — " + coolItem.detail : ""), sku: coolItem.sku, qty: "1" }]
        : [],
    },
    {
      label: "Příslušenství",
      items: [
        pick(FIX_BRACKET,      sel.fixBracket,      "") ? { ...pick(FIX_BRACKET,      sel.fixBracket,      ""), qty: "1" } : null,
        pick(DOOR_SWITCH,      sel.doorSwitch,      "") ? { ...pick(DOOR_SWITCH,      sel.doorSwitch,      ""), qty: "1" } : null,
        pick(LED_LIGHT,        sel.ledLight,        "") ? { ...pick(LED_LIGHT,        sel.ledLight,        ""), qty: "1" } : null,
        pick(UNDERGROUND_BASE, sel.undergroundBase, "") ? { ...pick(UNDERGROUND_BASE, sel.undergroundBase, ""), qty: "1" } : null,
      ].filter(Boolean),
    },
  ];
}

    <div style={{ display: "flex", alignItems: "center", gap: "10px",
      marginBottom: "20px", paddingBottom: "12px",
      borderBottom: `2px solid ${RED_ACCENT}` }}>
      <span style={{ color: RED_ACCENT, fontWeight: "700", fontSize: "13px",
        letterSpacing: "2px", fontFamily: "monospace" }}>
        {String(num).padStart(2, "0")} —
      </span>
      <span style={{ color: PLP_BLUE, fontWeight: "700", fontSize: "13px",
        letterSpacing: "2px", textTransform: "uppercase", fontFamily: "monospace" }}>
        {text}
      </span>
    </div>
  );
}

function SubLabel({ text }) {
  return (
    <div style={{ fontSize: "11px", fontWeight: "700", color: PLP_BLUE,
      letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: "10px",
      marginTop: "20px" }}>
      {text}
    </div>
  );
}

function OptionCard({ item, selected, disabled, onSelect }) {
  const active = selected === item.code;
  const dim = disabled && !active;
  return (
    <button
      onClick={() => !disabled && onSelect(item.code)}
      style={{
        padding: "12px 14px", cursor: disabled ? "not-allowed" : "pointer",
        display: "flex", flexDirection: "column", gap: "3px",
        fontFamily: "inherit", textAlign: "left", width: "100%",
        background: active ? PLP_BLUE : (dim ? "#f5f5f5" : CARD_BG),
        border: active ? `2px solid ${PLP_BLUE}` : `2px solid ${dim ? "#ddd" : BORDER}`,
        transition: "all 0.15s",
        opacity: dim ? 0.5 : 1,
      }}
    >
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: "8px" }}>
        <span style={{ fontWeight: "700", fontSize: "12px",
          color: active ? "white" : DARK_GRAY }}>
          {item.label}
        </span>
        {item.sku && (
          <span style={{
            fontSize: "10px", fontWeight: "700", letterSpacing: "1px",
            fontFamily: "monospace", padding: "2px 7px", flexShrink: 0,
            background: active ? "rgba(255,255,255,0.2)" : LIGHT_BG,
            color: active ? "white" : PLP_BLUE,
          }}>
            {item.sku}
          </span>
        )}
      </div>
      {item.detail && (
        <span style={{ fontSize: "10px", color: active ? "rgba(255,255,255,0.75)" : MID_GRAY }}>
          {item.detail}
        </span>
      )}
    </button>
  );
}

function OptionGrid({ items, selected, onSelect, disabledCodes = [] }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: "8px" }}>
      {items.map(item => (
        <OptionCard
          key={item.code}
          item={item}
          selected={selected}
          disabled={disabledCodes.includes(item.code)}
          onSelect={onSelect}
        />
      ))}
    </div>
  );
}

// ── Step indicator ──────────────────────────────────────────────────────────
const STEPS = [
  { num: 1, label: "Skříň" },
  { num: 2, label: "Topení" },
  { num: 3, label: "Chlazení" },
  { num: 4, label: "Příslušenství" },
];

function StepIndicator({ currentStep }) {
  return (
    <div style={{ background: CARD_BG, borderBottom: `1px solid ${BORDER}`, padding: "0 24px" }}>
      <div style={{ maxWidth: "960px", margin: "0 auto", display: "flex", alignItems: "stretch" }}>
        {STEPS.map((step) => {
          const done   = currentStep > step.num;
          const active = currentStep === step.num;
          const future = currentStep < step.num;
          return (
            <div key={step.num} style={{
              flex: 1, display: "flex", alignItems: "center", justifyContent: "center",
              gap: "8px", padding: "14px 8px",
              borderBottom: active ? `3px solid ${PLP_BLUE}` : future ? "3px solid transparent" : `3px solid ${RED_ACCENT}`,
              background: active ? LIGHT_BG : "transparent",
            }}>
              <div style={{
                width: "22px", height: "22px", borderRadius: "50%", flexShrink: 0,
                display: "flex", alignItems: "center", justifyContent: "center",
                fontWeight: "700", fontSize: "11px", fontFamily: "monospace",
                background: active ? PLP_BLUE : done ? RED_ACCENT : BORDER,
                color: (active || done) ? "white" : MID_GRAY,
              }}>
                {done ? "✓" : step.num}
              </div>
              <span style={{
                fontWeight: "700", fontSize: "11px", letterSpacing: "1px",
                textTransform: "uppercase", fontFamily: "monospace",
                color: active ? PLP_BLUE : done ? DARK_GRAY : MID_GRAY,
              }}>
                {step.label}
              </span>
            </div>
          );
        })}
        <div style={{
          flex: 1, display: "flex", alignItems: "center", justifyContent: "center",
          gap: "8px", padding: "14px 8px",
          borderBottom: currentStep === 5 ? `3px solid ${PLP_BLUE}` : "3px solid transparent",
          background: currentStep === 5 ? LIGHT_BG : "transparent",
        }}>
          <div style={{
            width: "22px", height: "22px", borderRadius: "50%", flexShrink: 0,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontWeight: "700", fontSize: "11px", fontFamily: "monospace",
            background: currentStep === 5 ? PLP_BLUE : BORDER,
            color: currentStep === 5 ? "white" : MID_GRAY,
          }}>
            ★
          </div>
          <span style={{
            fontWeight: "700", fontSize: "11px", letterSpacing: "1px",
            textTransform: "uppercase", fontFamily: "monospace",
            color: currentStep === 5 ? PLP_BLUE : MID_GRAY,
          }}>
            Souhrn
          </span>
        </div>
      </div>
    </div>
  );
}

// ── Navigation ──────────────────────────────────────────────────────────────
function NavButtons({ step, onBack, onNext, onPDF, canNext }) {
  return (
    <div style={{
      borderTop: `1px solid ${BORDER}`, background: CARD_BG,
      padding: "16px 24px", position: "sticky", bottom: 0, zIndex: 10,
    }}>
      <div style={{ maxWidth: "960px", margin: "0 auto", display: "flex", justifyContent: "space-between", gap: "12px" }}>
        <button
          onClick={onBack}
          style={{
            padding: "13px 28px", background: "transparent",
            border: `2px solid ${PLP_BLUE}`, color: PLP_BLUE,
            cursor: "pointer", fontWeight: "700", fontSize: "11px",
            letterSpacing: "2px", textTransform: "uppercase", fontFamily: "inherit",
            transition: "all 0.15s",
          }}
          onMouseEnter={e => { e.currentTarget.style.background = LIGHT_BG; }}
          onMouseLeave={e => { e.currentTarget.style.background = "transparent"; }}
        >
          ← PŘEDCHOZÍ KROK
        </button>
        {step < 5 ? (
          <button
            onClick={onNext}
            disabled={!canNext}
            style={{
              padding: "13px 32px",
              background: canNext ? "#F47920" : BORDER,
              color: canNext ? "white" : MID_GRAY,
              border: "none", cursor: canNext ? "pointer" : "not-allowed",
              fontWeight: "700", fontSize: "11px",
              letterSpacing: "2px", textTransform: "uppercase", fontFamily: "inherit",
              transition: "all 0.15s",
            }}
            onMouseEnter={e => { if (canNext) e.currentTarget.style.background = "#c45e10"; }}
            onMouseLeave={e => { if (canNext) e.currentTarget.style.background = "#F47920"; }}
          >
            DALŠÍ KROK →
          </button>
        ) : (
          <button
            onClick={onPDF}
            style={{
              padding: "13px 32px", background: "#F47920", color: "white",
              border: "none", cursor: "pointer", fontWeight: "700", fontSize: "11px",
              letterSpacing: "2px", textTransform: "uppercase", fontFamily: "inherit",
              transition: "background 0.15s",
            }}
            onMouseEnter={e => { e.currentTarget.style.background = "#c45e10"; }}
            onMouseLeave={e => { e.currentTarget.style.background = "#F47920"; }}
          >
            ↓ STÁHNOUT PDF
          </button>
        )}
      </div>
    </div>
  );
}

// ── Step 1: Cabinet ──────────────────────────────────────────────────────────
function Step1({ sel, setSel }) {
  const cabinetW = (CABINET_SIZES.find(x => x.code === sel.cabinetSize) || {}).w || "700";

  const basesWithSku = BASES.map(b => b.code === "N" ? b : {
    ...b,
    detail: `výška ${b.label}`,
    sku: b.skuMap[cabinetW],
  });

  return (
    <div style={{ animation: "fadeUp 0.35s ease" }}>
      <SectionLabel num={1} text="Rozváděčová skříň" />

      <SubLabel text="Velikost skříně" />
      <OptionGrid items={CABINET_SIZES} selected={sel.cabinetSize}
        onSelect={v => setSel(s => ({ ...s, cabinetSize: v }))} />

      <SubLabel text="Základna" />
      <OptionGrid items={basesWithSku} selected={sel.base}
        onSelect={v => setSel(s => ({ ...s, base: v }))} />

      <SubLabel text="Vertikální lišty" />
      <OptionGrid items={VERT_RAILS} selected={sel.vertRails}
        onSelect={v => setSel(s => ({ ...s, vertRails: v }))} />

      <SubLabel text="Levé kabelové vstupy" />
      <OptionGrid items={CABLE_LEFT} selected={sel.cableLeft}
        onSelect={v => setSel(s => ({ ...s, cableLeft: v }))} />

      <SubLabel text="Pravé kabelové vstupy" />
      <OptionGrid items={CABLE_RIGHT} selected={sel.cableRight}
        onSelect={v => setSel(s => ({ ...s, cableRight: v }))} />
    </div>
  );
}

// ── Step 2: Heating ──────────────────────────────────────────────────────────
function Step2({ sel, setSel }) {
  const hasHeater = sel.heater !== "N" && sel.heater !== null;

  return (
    <div style={{ animation: "fadeUp 0.35s ease" }}>
      <SectionLabel num={2} text="Topení" />

      <SubLabel text="Topná tělesa" />
      <OptionGrid
        items={HEATERS}
        selected={sel.heater}
        onSelect={v => {
          const newHeater = v;
          let newThermo = sel.thermostat;
          // if heater selected and thermostat is "N", reset to null (nothing chosen)
          if (newHeater !== "N" && newThermo === "N") newThermo = null;
          setSel(s => ({ ...s, heater: newHeater, thermostat: newThermo }));
        }}
      />

      <SubLabel text="Termostat / Hygrostat — řízení topení" />
      <OptionGrid
        items={THERMOSTATS}
        selected={sel.thermostat}
        disabledCodes={hasHeater ? ["N"] : []}
        onSelect={v => setSel(s => ({ ...s, thermostat: v }))}
      />

      <SubLabel text="Police s vyhřívací podložkou" />
      <OptionGrid items={HEATED_SHELF} selected={sel.heatedShelf}
        onSelect={v => setSel(s => ({ ...s, heatedShelf: v }))} />
    </div>
  );
}

// ── Step 3: Cooling ──────────────────────────────────────────────────────────
function Step3({ sel, setSel }) {
  return (
    <div style={{ animation: "fadeUp 0.35s ease" }}>
      <SectionLabel num={3} text="Chlazení" />
      <p style={{ fontSize: "11px", color: MID_GRAY, marginBottom: "20px" }}>
        Ze všech možností vyberte pouze jednu.
      </p>
      {COOLING.map(group => (
        <div key={group.group}>
          <SubLabel text={group.group} />
          <OptionGrid
            items={group.options}
            selected={sel.cooling}
            onSelect={v => setSel(s => ({ ...s, cooling: v }))}
          />
        </div>
      ))}
    </div>
  );
}

// ── Step 4: Accessories ──────────────────────────────────────────────────────
function Step4({ sel, setSel }) {
  return (
    <div style={{ animation: "fadeUp 0.35s ease" }}>
      <SectionLabel num={4} text="Příslušenství" />

      <SubLabel text="Fixační konzole" />
      <OptionGrid items={FIX_BRACKET} selected={sel.fixBracket}
        onSelect={v => setSel(s => ({ ...s, fixBracket: v }))} />

      <SubLabel text="Konzole s dveřními spínači" />
      <OptionGrid items={DOOR_SWITCH} selected={sel.doorSwitch}
        onSelect={v => setSel(s => ({ ...s, doorSwitch: v }))} />

      <SubLabel text="LED osvětlení" />
      <OptionGrid items={LED_LIGHT} selected={sel.ledLight}
        onSelect={v => setSel(s => ({ ...s, ledLight: v }))} />

      <SubLabel text="Podzemní základna" />
      <OptionGrid items={UNDERGROUND_BASE} selected={sel.undergroundBase}
        onSelect={v => setSel(s => ({ ...s, undergroundBase: v }))} />
    </div>
  );
}

// ── Step 5: Summary ──────────────────────────────────────────────────────────
function Step5({ bom }) {
  let rowIdx = 0;
  return (
    <div style={{ animation: "fadeUp 0.35s ease" }}>
      <SectionLabel num={5} text="Souhrn konfigurace" />
      <p style={{ fontSize: "11px", color: MID_GRAY, marginBottom: "24px" }}>
        Zkontrolujte konfiguraci a stáhněte PDF.
      </p>

      <div style={{ background: CARD_BG, border: `1px solid ${BORDER}`, overflow: "hidden" }}>
        <div style={{ background: PLP_BLUE, padding: "12px 20px", display: "flex", alignItems: "center" }}>
          <span style={{ color: RED_ACCENT, fontWeight: "900", fontSize: "11px",
            letterSpacing: "2px", fontFamily: "monospace" }}>
            VYBRANÉ POLOŽKY
          </span>
        </div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "11px" }}>
            <thead>
              <tr style={{ background: LIGHT_BG }}>
                {[["Položka", "left"], ["Obj. kód", "left"], ["Množství", "center"]].map(([h, align]) => (
                  <th key={h} style={{ padding: "10px 14px", textAlign: align,
                    fontWeight: "700", fontSize: "11px", letterSpacing: "1.5px",
                    textTransform: "uppercase", color: PLP_BLUE, fontFamily: "monospace",
                    borderBottom: `2px solid ${BORDER}` }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {bom.map(({ label, items }) => [
                <tr key={`hdr-${label}`} style={{ background: LIGHT_BG, borderBottom: `1px solid ${BORDER}` }}>
                  <td colSpan={3} style={{ padding: "5px 14px", fontWeight: "700", fontSize: "11px",
                    letterSpacing: "2px", textTransform: "uppercase", color: PLP_BLUE,
                    fontFamily: "monospace" }}>
                    {label}
                  </td>
                </tr>,
                items.length === 0
                  ? <tr key={`empty-${label}`} style={{ borderBottom: `1px solid ${BORDER}` }}>
                      <td colSpan={3} style={{ padding: "8px 14px", color: MID_GRAY,
                        fontSize: "11px", fontStyle: "italic" }}>— nevybráno —</td>
                    </tr>
                  : items.map((item, i) => {
                      const bg = rowIdx++ % 2 === 0 ? CARD_BG : "#f8fcff";
                      return (
                        <tr key={`${label}-${i}`} style={{ borderBottom: `1px solid ${BORDER}`, background: bg }}>
                          <td style={{ padding: "9px 14px", color: DARK_GRAY, lineHeight: "1.4" }}>{item.name}</td>
                          <td style={{ padding: "9px 14px", fontFamily: "monospace", fontWeight: "700",
                            color: PLP_BLUE, fontSize: "12px", whiteSpace: "nowrap" }}>{item.sku || "—"}</td>
                          <td style={{ padding: "9px 14px", textAlign: "center", fontWeight: "700",
                            fontFamily: "monospace", color: PLP_BLUE, fontSize: "12px" }}>{item.qty || "1"}</td>
                        </tr>
                      );
                    }),
              ])}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

const thStyle = {
  padding: "8px 14px", textAlign: "left", fontSize: "10px",
  fontWeight: "700", letterSpacing: "1.5px", textTransform: "uppercase",
  fontFamily: "monospace", color: PLP_BLUE, borderBottom: `1px solid ${BORDER}`,
};
const tdStyle = {
  padding: "9px 14px", fontSize: "11px", color: DARK_GRAY,
  borderBottom: `1px solid ${BORDER}`,
};

// ── Intro step 0 ─────────────────────────────────────────────────────────────
function Intro({ onStart }) {
  return (
    <div style={{ maxWidth: "960px", margin: "0 auto", padding: "48px 24px 60px" }}>
      <div style={{ background: CARD_BG, border: `1px solid ${BORDER}` }}>
        <div style={{ background: "#001f66", padding: "28px 32px", borderBottom: `3px solid ${RED_ACCENT}` }}>
          <div style={{ fontSize: "10px", fontWeight: "700", letterSpacing: "3px",
            fontFamily: "monospace", color: RED_ACCENT, marginBottom: "8px", textTransform: "uppercase" }}>
            KONFIGURÁTOR PRODUKTU
          </div>
          <h2 style={{ fontSize: "28px", fontWeight: "900", color: "#aaa",
            letterSpacing: "1px", fontFamily: "monospace", textTransform: "uppercase", margin: 0 }}>
            SMARTCAB SAP 4
          </h2>
        </div>

        <div style={{ padding: "32px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px" }}>
          {[
            { label: "Krytí",   value: "IP55 / IK10" },
            { label: "Materiál", value: "Aluzinkový plech 1,5 mm" },
            { label: "Izolace", value: "30 mm vnitřní izolace" },
            { label: "Povrch",  value: "Polyesterový prášk. lak, RAL 7035, UV ochrana" },
            { label: "Normy",   value: "EN 60 529, EN 62 262, EN 62 208 ed.2:2012" },
            { label: "Nasazení", value: "Energetika, Telekomunikace, Doprava, Security" },
          ].map(f => (
            <div key={f.label} style={{ padding: "14px 16px", background: LIGHT_BG,
              borderLeft: `3px solid ${PLP_BLUE}` }}>
              <div style={{ fontSize: "10px", fontWeight: "700", letterSpacing: "1.5px",
                textTransform: "uppercase", fontFamily: "monospace", color: MID_GRAY,
                marginBottom: "4px" }}>
                {f.label}
              </div>
              <div style={{ fontSize: "12px", fontWeight: "600", color: DARK_GRAY }}>
                {f.value}
              </div>
            </div>
          ))}
        </div>


        <div style={{ padding: "24px 32px 32px" }}>
          <button
            onClick={onStart}
            style={{
              width: "100%", padding: "18px", background: "#F47920", color: "white",
              border: "none", cursor: "pointer", display: "flex", alignItems: "center",
              justifyContent: "center", gap: "12px", fontWeight: "900", fontSize: "12px",
              letterSpacing: "3px", textTransform: "uppercase", fontFamily: "inherit",
              transition: "background 0.2s",
            }}
            onMouseEnter={e => { e.currentTarget.style.background = "#c45e10"; }}
            onMouseLeave={e => { e.currentTarget.style.background = "#F47920"; }}
          >
            ▶ ZAHÁJIT KONFIGURACI
          </button>
        </div>
      </div>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
const INITIAL_SEL = {
  cabinetSize:     null,
  base:            "N",
  vertRails:       "N",
  cableLeft:       "N",
  cableRight:      "N",
  heater:          "N",
  thermostat:      "N",
  heatedShelf:     "N",
  cooling:         "N",
  fixBracket:      "N",
  doorSwitch:      "N",
  ledLight:        "N",
  undergroundBase: "N",
};

function App() {
  const [step, setStep] = useState(0);
  const [sel, setSel] = useState(INITIAL_SEL);

  const bom = useMemo(() => buildBOM(sel), [sel]);

  const canNext = step === 1 ? !!sel.cabinetSize : true;

  const handleNext = () => { window.scrollTo({ top: 0, behavior: "smooth" }); setStep(s => s + 1); };
  const handleBack = () => { window.scrollTo({ top: 0, behavior: "smooth" }); setStep(s => s - 1); };

  if (step === 0) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, fontFamily: "'Barlow', Arial, sans-serif" }}>
        <Navbar />
        <Intro onStart={() => setStep(1)} />
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: LIGHT_BG, fontFamily: "'Barlow', Arial, sans-serif",
      display: "flex", flexDirection: "column" }}>
      <Navbar />
      <StepIndicator currentStep={step} />
      <div style={{ flex: 1 }}>
        <div style={{ maxWidth: "960px", margin: "0 auto", padding: "32px 24px 24px" }}>
          {step === 1 && <Step1 sel={sel} setSel={setSel} />}
          {step === 2 && <Step2 sel={sel} setSel={setSel} />}
          {step === 3 && <Step3 sel={sel} setSel={setSel} />}
          {step === 4 && <Step4 sel={sel} setSel={setSel} />}
          {step === 5 && <Step5 bom={bom} />}
        </div>
      </div>
      <NavButtons
        step={step}
        onBack={handleBack}
        onNext={handleNext}
        onPDF={() => generatePDF(bom)}
        canNext={canNext}
      />
    </div>
  );
}

function Navbar() {
  return (
    <div style={{
      background: PLP_BLUE, padding: "0 32px",
      display: "flex", alignItems: "center", justifyContent: "space-between",
      height: "52px", borderBottom: "3px solid rgba(255,255,255,0.3)",
    }}>
      <h1 style={{ margin: 0, display: "flex", alignItems: "baseline", gap: "0" }}>
        <span style={{ fontSize: "20px", fontWeight: "900", color: "white",
          letterSpacing: "-0.5px", textTransform: "uppercase" }}>
          SMARTCAB SAP 4
        </span>
        <span style={{ fontSize: "20px", fontWeight: "900", color: "rgba(255,255,255,0.45)",
          letterSpacing: "-0.5px", marginLeft: "8px", textTransform: "uppercase" }}>
          KONFIGURÁTOR
        </span>
      </h1>
      <div style={{
        border: "1.5px solid rgba(255,255,255,0.5)", padding: "4px 10px",
        color: "white", fontSize: "10px", fontWeight: "700",
        letterSpacing: "2px", fontFamily: "monospace",
      }}>
        PLP · VENKOVNÍ ROZVÁDĚČOVÉ SKŘÍNĚ · SMARTCAB SAP 4
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
